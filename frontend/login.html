<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StegoShield</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Login</h1>
            <p class="tagline">Access your secure account</p>
            
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                    <span class="error-message" id="email-error"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="error-message" id="password-error"></span>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                </div>
                
                <button type="submit" class="btn" id="login-btn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loading" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> Logging in...
                    </span>
                </button>
            </form>
            
            <div class="auth-links">
                <a href="forgot-password.html" class="link">Forgot Password?</a>
                <p>Don't have an account? <a href="signup.html" class="link">Sign Up</a></p>
            </div>
            
            <div class="back-link">
                <a href="welcome.html">← Back to Home</a>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="footer-content">
            <div class="tag">🔐 Security First</div>
            <p>Hide. Protect. Communicate Securely.</p>
            <div class="divider"></div>
            <p>© 2026 StegoShield</p>
        </div>
    </footer>

    <script>
        function togglePassword(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const eyeIcon = document.getElementById(fieldId + '-eye');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function showError(fieldId, message) {
            document.getElementById(fieldId + '-error').textContent = message;
        }

        function clearErrors() {
            document.getElementById('email-error').textContent = '';
            document.getElementById('password-error').textContent = '';
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            clearErrors();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('login-btn');
            const btnText = loginBtn.querySelector('.btn-text');
            const btnLoading = loginBtn.querySelector('.btn-loading');
            
            // Validation
            let isValid = true;
            
            if (!email) {
                showError('email', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            }
            
            if (!password) {
                showError('password', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showError('password', 'Password must be at least 6 characters');
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Show loading state
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            loginBtn.disabled = true;
            
            // Simulate authentication
            setTimeout(() => {
                // For demo: accept gmail.com emails with any password
                if (email.endsWith('@gmail.com') || email.endsWith('@stegoshield.com')) {
                    console.log('Login successful:', { email, remember });
                    
                    // Store session (in real app, this would be server-side)
                    if (remember) {
                        localStorage.setItem('userEmail', email);
                    } else {
                        sessionStorage.setItem('userEmail', email);
                    }
                    
                    // Extract name from email and store it
                    const emailParts = email.split('@');
                    const userName = emailParts[0].charAt(0).toUpperCase() + emailParts[0].slice(1);
                    localStorage.setItem('userName', userName);
                    
                    // Redirect to main app
                    window.location.href = 'index.html';
                } else {
                    showError('email', 'Please use a valid email address (@gmail.com or @stegoshield.com for demo)');
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                    loginBtn.disabled = false;
                }
            }, 1500);
        });

        // Auto-fill remembered email
        window.addEventListener('load', function() {
            const rememberedEmail = localStorage.getItem('userEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }
        });
    </script>
</body>
</html>
